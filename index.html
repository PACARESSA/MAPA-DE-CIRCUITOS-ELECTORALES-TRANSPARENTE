<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Circuitos Electorales</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        /* Ajustes de tamaño para que el mapa ocupe toda la pantalla */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .info-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="info-title">
        <h3>Circuitos Electorales</h3>
        <p>Pasa el cursor o haz clic sobre un circuito para ver su etiqueta.</p>
    </div>

    <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. Inicializar el mapa centrado en una posición inicial (Buenos Aires/Mar del Plata aprox)
        // El zoom inicial es 8, pero se autoajustará luego a los circuitos
        var map = L.map('map').setView([-37.5, -58.5], 8);

        // 2. Añadir un mapa base gratuito (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Función para interactuar con cada circuito (Feature)
        function labelCircuitos(feature, layer) {
            // Validamos si la propiedad existe (ajusta 'circuito' si en tu JSON se llama diferente, ej: 'CIRCUITO')
            if (feature.properties && feature.properties.circuito) {
                
                // Opción A: Crear una etiqueta emergente clásica al hacer CLIC (Popup)
                layer.bindPopup("<strong>Circuito Electoral:</strong> " + feature.properties.circuito);
                
                // Opción B: Crear una etiqueta permanente o tooltip al pasar el MOUSE
                layer.bindTooltip("Circuito: " + feature.properties.circuito, {
                    sticky: true // Sigue al cursor
                });
            }

            // Cambiar estilos visuales al pasar el mouse por encima (opcional pero interactivo)
            layer.on({
                mouseover: function (e) {
                    var layer = e.target;
                    layer.setStyle({
                        weight: 3,
                        color: '#3388ff',
                        fillOpacity: 0.7
                    });
                },
                mouseout: function (e) {
                    geojsonLayer.resetStyle(e.target);
                }
            });
        }

        // Estilo visual por defecto de los circuitos poligonales
       function estiloCircuitos(feature) {

    var electores = feature.properties.Electores || 
                    feature.properties.electores || 
                    0;

    var color = 
        electores <= 2500 ? '#ffffcc' :
        electores <= 5000 ? '#a1dab4' :
        electores <= 10000 ? '#41b6c4' :
        electores <= 15000 ? '#2c7fb8' :
        '#253494';

    return {
    color: "#555",
    weight: 0.4,
    opacity: 0.35,
    fillColor: color,
    fillOpacity: 0.18
};
}

        // 4. Cargar el archivo GeoJSON dinámicamente
        // Nota: Asegúrate de renombrar tu archivo a "circuitos.json" y guardarlo en la misma carpeta que este HTML
        var geojsonLayer;
        
        fetch('circuitos_subdivididos_corregido.geojson')
            .then(response => response.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    style: estiloCircuitos,
                    onEachFeature: labelCircuitos
                }).addTo(map);
map.fitBounds(geojsonLayer.getBounds());
                // Autoajustar el zoom de la pantalla para que encuadre perfectamente todos tus circuitos cargados
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => console.error('Error cargando el archivo GeoJSON:', error));
var legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {

    var div = L.DomUtil.create('div', 'info legend');

    var rangos = [
        {color: '#ffffcc', texto: '0 - 2.500 electores'},
        {color: '#a1dab4', texto: '2.501 - 5.000 electores'},
        {color: '#41b6c4', texto: '5.001 - 10.000 electores'},
        {color: '#2c7fb8', texto: '10.001 - 15.000 electores'},
        {color: '#253494', texto: 'Más de 15.000 electores'}
    ];

    div.innerHTML = '<b>Cantidad de electores</b><br>';

    rangos.forEach(function(rango) {
        div.innerHTML +=
        '<i style="background:' + rango.color + 
        '; width:18px; height:18px; display:inline-block; margin-right:5px;"></i>' +
        rango.texto + '<br>';
    });

    return div;
};

legend.addTo(map);
    </script>
</body>
</html>
